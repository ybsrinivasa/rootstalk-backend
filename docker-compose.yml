# Local development — uses the shared postgres and redis from cosh-backend
# Start with: docker-compose up -d (postgres and redis are already running from cosh-backend)
# RootsTalk uses database 1 on Redis and the rootstalk_dev PostgreSQL database

services:
  api:
    build: .
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8001
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    env_file: .env
    network_mode: host

  celery:
    build: .
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    network_mode: host
